trigger:
  branches:
    include:
      - main
      - master
      - develop

variables:
  buildConfiguration: 'Release'
  solution: 'AstroKid.Tests.sln'
  # Variables de entorno para tests (pueden ser sobrescritas en Azure DevOps)
  ASTROKID_BASE_URL: '$(ASTROKID_BASE_URL)'
  ASTROKID_ENV: '$(ASTROKID_ENV)'

jobs:
- job: BuildAndTest
  displayName: 'Compilar y Ejecutar Tests'
  pool:
    vmImage: 'windows-latest'  # Cambiar según tu pool disponible
  steps:
    - checkout: self
      displayName: 'Checkout código'
    
    - task: UseDotNet@2
      displayName: 'Instalar .NET SDK 9.0'
      inputs:
        packageType: 'sdk'
        version: '9.0.x'
        installationPath: $(Agent.ToolsDirectory)/dotnet

    - task: DotNetCoreCLI@2
      displayName: 'Restaurar paquetes'
      inputs:
        command: 'restore'
        projects: '$(solution)'
        feedsToUse: 'select'

    - task: DotNetCoreCLI@2
      displayName: 'Compilar solución'
      inputs:
        command: 'build'
        projects: '$(solution)'
        arguments: '--configuration $(buildConfiguration) --no-restore'
        publishTestResults: false

    - task: PowerShell@2
      displayName: 'Instalar Playwright Browsers'
      inputs:
        targetType: 'inline'
        script: |
          cd $(System.DefaultWorkingDirectory)
          dotnet build UI.Tests/UI.Tests.csproj
          pwsh -Command "& { $env:PLAYWRIGHT_BROWSERS_PATH='0'; dotnet exec --runtimeconfig UI.Tests/bin/$(buildConfiguration)/net9.0/UI.Tests.runtimeconfig.json --depsfile UI.Tests/bin/$(buildConfiguration)/net9.0/UI.Tests.deps.json --additionalprobingpath $(UserProfile)/.nuget/packages Microsoft.Playwright.CLI.dll install chromium }"
        pwsh: true
      continueOnError: true  # Continuar aunque falle, los tests de UI pueden ejecutarse después

    - task: DotNetCoreCLI@2
      displayName: 'Ejecutar tests de API'
      inputs:
        command: 'test'
        projects: 'API.Tests/API.Tests.csproj'
        arguments: |
          --configuration $(buildConfiguration)
          --no-build
          --collect:"XPlat Code Coverage"
          --logger trx
          --results-directory $(Agent.TempDirectory)/TestResults
        publishTestResults: true
        testRunTitle: 'AstroKid API Tests'
      env:
        ASTROKID_BASE_URL: '$(ASTROKID_BASE_URL)'
        ASTROKID_ENV: '$(ASTROKID_ENV)'
      continueOnError: false

    - task: DotNetCoreCLI@2
      displayName: 'Ejecutar tests de UI'
      inputs:
        command: 'test'
        projects: 'UI.Tests/UI.Tests.csproj'
        arguments: |
          --configuration $(buildConfiguration)
          --no-build
          --collect:"XPlat Code Coverage"
          --logger trx
          --results-directory $(Agent.TempDirectory)/TestResults
        publishTestResults: true
        testRunTitle: 'AstroKid UI Tests'
      env:
        BASE_URL: '$(BASE_URL)'
        ASTROKID_BASE_URL: '$(ASTROKID_BASE_URL)'
      continueOnError: true  # Los tests de UI pueden fallar si no hay backend disponible

